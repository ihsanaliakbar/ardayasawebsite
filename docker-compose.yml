services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./server
      dockerfile: Ardayasa.Api/Dockerfile
    env_file: .env
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Default: Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      App__WebBaseUrl: http://localhost:4200
    ports:
      - "5000:8080"
    volumes:
      - filestorage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ./client
    environment:
      API_BASE_URL: http://api:8080
    ports:
      - "4200:4000"
    depends_on:
      - api

volumes:
  pgdata:
  filestorage:
